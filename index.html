<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Options Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-yellow { background-color: #fef9c3; border: 1px solid #fde047; }
        .input-yellow:focus { background-color: #fef08a; outline: 2px solid #eab308; }
        body { min-height: -webkit-fill-available; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .table-container { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 pb-20">

    <div class="max-w-md mx-auto">
        
        <!-- Sticky Header / Results -->
        <div class="sticky top-0 z-10 bg-slate-100 pt-4 px-4 pb-2 shadow-sm border-b border-slate-200">
            <div class="bg-blue-600 rounded-xl p-4 text-white shadow-md mb-3 text-center">
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-wider">Stock Cost If Assigned</p>
                <div class="text-3xl font-bold" id="res-stock-cost">$0.00</div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-tighter">Return</p>
                    <p class="text-sm font-bold text-slate-800" id="res-raw-return">0.00%</p>
                </div>
                <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                    <p class="text-slate-500 text-[9px] font-bold uppercase tracking-tighter">Ann.</p>
                    <p class="text-sm font-bold text-slate-800" id="res-ann-return">0.00%</p>
                </div>
                <div class="bg-emerald-50 p-2 rounded-lg border border-emerald-200 text-center shadow-sm">
                    <p class="text-emerald-700 text-[9px] font-bold uppercase tracking-tighter">Net (Tax)</p>
                    <p class="text-sm font-bold text-emerald-600" id="res-tax-return">0.00%</p>
                </div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="p-4 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Stock Ticker</label>
                        <input type="text" id="stock" placeholder="e.g. NVDA" class="w-full p-3 rounded-lg input-yellow uppercase font-bold text-lg">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Strike ($)</label>
                            <input type="number" id="strike" placeholder="0.00" inputmode="decimal" class="w-full p-3 rounded-lg input-yellow font-bold text-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Premium ($)</label>
                            <input type="number" id="premium" placeholder="0.00" inputmode="decimal" class="w-full p-3 rounded-lg input-yellow font-bold text-lg">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Expiration</label>
                            <input type="date" id="expiry" class="w-full p-3 rounded-lg input-yellow text-sm font-bold">
                            <p class="text-[10px] text-blue-600 font-bold mt-1">DTE: <span id="display-dte">0</span> days</p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Tax Rate %</label>
                            <input type="number" id="taxRate" value="24" inputmode="numeric" class="w-full p-3 border border-slate-200 rounded-lg font-bold text-lg">
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <button onclick="addToList()" class="bg-blue-600 text-white font-bold py-3 rounded-lg shadow-md active:bg-blue-700 uppercase text-sm">Add to List</button>
                        <button onclick="clearList()" class="bg-slate-200 text-slate-700 font-bold py-3 rounded-lg active:bg-slate-300 uppercase text-sm">Reset List</button>
                    </div>
                </div>
            </div>

            <!-- List/Table Section -->
            <div id="list-container" class="hidden">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Saved Calculations</h3>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden overflow-x-auto table-container">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase">
                            <tr>
                                <th class="px-3 py-2">Stock</th>
                                <th class="px-3 py-2">Cost</th>
                                <th class="px-3 py-2 text-right">Ann %</th>
                                <th class="px-3 py-2 text-right">Net %</th>
                                <th class="px-2 py-2"></th>
                            </tr>
                        </thead>
                        <tbody id="history-body" class="divide-y divide-slate-100">
                            <!-- Rows go here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const outputs = {
            stockCost: document.getElementById('res-stock-cost'),
            rawReturn: document.getElementById('res-raw-return'),
            annReturn: document.getElementById('res-ann-return'),
            taxReturn: document.getElementById('res-tax-return'),
            dteDisplay: document.getElementById('display-dte'),
            historyBody: document.getElementById('history-body'),
            listContainer: document.getElementById('list-container')
        };

        let currentData = {};

        function calculate() {
            const stock = document.getElementById('stock').value || "---";
            const strike = parseFloat(document.getElementById('strike').value);
            const premium = parseFloat(document.getElementById('premium').value);
            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            const expiryValue = document.getElementById('expiry').value;

            if (isNaN(strike) || isNaN(premium)) {
                resetUI();
                return;
            }

            let dte = 0;
            if (expiryValue) {
                const [year, month, day] = expiryValue.split('-').map(Number);
                const expiryDate = new Date(year, month - 1, day);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                expiryDate.setHours(0, 0, 0, 0);
                dte = Math.round((expiryDate - today) / (1000 * 60 * 60 * 24));
                dte = dte > 0 ? dte : 0;
            }
            outputs.dteDisplay.innerText = dte;

            const stockCost = (strike * 100) - (premium * 100);
            const cap = strike - premium;
            const rawReturn = cap > 0 ? (premium / cap) * 100 : 0;
            const annReturn = dte > 0 ? rawReturn * (365 / dte) : rawReturn * 365;
            const taxReturn = annReturn * (1 - (taxRate / 100));

            currentData = {
                stock: stock.toUpperCase(),
                cost: new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(stockCost),
                ann: annReturn.toFixed(2) + '%',
                net: taxReturn.toFixed(2) + '%'
            };

            outputs.stockCost.innerText = currentData.cost;
            outputs.rawReturn.innerText = rawReturn.toFixed(2) + '%';
            outputs.annReturn.innerText = currentData.ann;
            outputs.taxReturn.innerText = currentData.net;
        }

        function addToList() {
            if (!currentData.stock || currentData.stock === "---") return;
            
            outputs.listContainer.classList.remove('hidden');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-3 py-3 font-bold text-slate-800">${currentData.stock}</td>
                <td class="px-3 py-3 text-slate-600">${currentData.cost}</td>
                <td class="px-3 py-3 text-right font-medium">${currentData.ann}</td>
                <td class="px-3 py-3 text-right font-bold text-emerald-600">${currentData.net}</td>
                <td class="px-2 py-3 text-right">
                    <button onclick="this.closest('tr').remove()" class="text-red-400 p-1">✕</button>
                </td>
            `;
            outputs.historyBody.prepend(row);
        }

        function clearList() {
            outputs.historyBody.innerHTML = '';
            outputs.listContainer.classList.add('hidden');
        }

        function resetUI() {
            outputs.stockCost.innerText = "$0.00";
            outputs.rawReturn.innerText = "0.00%";
            outputs.annReturn.innerText = "0.00%";
            outputs.taxReturn.innerText = "0.00%";
            outputs.dteDisplay.innerText = "0";
            currentData = {};
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
