<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Options Mobile Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-yellow {
            background-color: #fef9c3;
            border: 1px solid #fde047;
        }
        .input-yellow:focus {
            background-color: #fef08a;
            outline: 2px solid #eab308;
        }
        /* Prevents the keyboard from pushing layout weirdly on some mobile browsers */
        body { min-height: -webkit-fill-available; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <div class="max-w-md mx-auto">
        
        <div class="sticky top-0 z-10 bg-slate-100 pt-4 px-4 pb-2 shadow-sm border-b border-slate-200">
            <div class="bg-blue-600 rounded-xl p-4 text-white shadow-md mb-3">
                <p class="text-blue-100 text-[10px] font-bold uppercase tracking-wider">Stock Cost If Assigned</p>
                <div class="text-3xl font-bold" id="res-stock-cost">$0.00</div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                    <p class="text-slate-500 text-[9px] font-bold uppercase">Return</p>
                    <p class="text-sm font-bold text-slate-800" id="res-raw-return">0.00%</p>
                </div>
                <div class="bg-white p-2 rounded-lg border border-slate-200 text-center shadow-sm">
                    <p class="text-slate-500 text-[9px] font-bold uppercase">Ann.</p>
                    <p class="text-sm font-bold text-slate-800" id="res-ann-return">0.00%</p>
                </div>
                <div class="bg-emerald-50 p-2 rounded-lg border border-emerald-200 text-center shadow-sm">
                    <p class="text-emerald-700 text-[9px] font-bold uppercase">Net (Tax)</p>
                    <p class="text-sm font-bold text-emerald-600" id="res-tax-return">0.00%</p>
                </div>
            </div>
        </div>

        <div class="p-4 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-sm font-bold text-slate-700 mb-4 flex items-center uppercase tracking-tight">
                    <span class="mr-2">⚙️</span> Adjust Parameters
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Stock Ticker</label>
                        <input type="text" id="stock" value="AMD" class="w-full p-3 rounded-lg input-yellow uppercase font-bold text-lg">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Strike ($)</label>
                            <input type="number" id="strike" value="112" step="any" class="w-full p-3 rounded-lg input-yellow font-bold text-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Premium ($)</label>
                            <input type="number" id="premium" value="1.10" step="any" class="w-full p-3 rounded-lg input-yellow font-bold text-lg">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Expiration</label>
                            <input type="date" id="expiry" class="w-full p-3 rounded-lg input-yellow text-sm font-bold">
                            <p class="text-[10px] text-blue-600 font-bold mt-1">DTE: <span id="display-dte">--</span> days</p>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase">Tax Rate %</label>
                            <input type="number" id="taxRate" value="24" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none font-bold text-lg">
                        </div>
                    </div>
                </div>
            </div>
            
            <p class="text-center text-[10px] text-slate-400 pb-10">Calculations update automatically as you type.</p>
        </div>
    </div>

    <script>
        // Set default date (today + 30 days)
        window.onload = function() {
            const date = new Date();
            date.setDate(date.getDate() + 30);
            document.getElementById('expiry').valueAsDate = date;
            calculate();
        };

        const outputs = {
            stockCost: document.getElementById('res-stock-cost'),
            rawReturn: document.getElementById('res-raw-return'),
            annReturn: document.getElementById('res-ann-return'),
            taxReturn: document.getElementById('res-tax-return'),
            dteDisplay: document.getElementById('display-dte')
        };

        function calculate() {
            const strike = parseFloat(document.getElementById('strike').value) || 0;
            const premium = parseFloat(document.getElementById('premium').value) || 0;
            const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            const expiryValue = document.getElementById('expiry').value;

            let dte = 1;
            if (expiryValue) {
                const expiryDate = new Date(expiryValue);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                expiryDate.setHours(0, 0, 0, 0);
                const diffTime = expiryDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                dte = diffDays > 0 ? diffDays : 1;
            }
            outputs.dteDisplay.innerText = dte;

            const stockCost = (strike * 100) - (premium * 100);
            const rawReturn = (strike - premium) !== 0 ? (premium / (strike - premium)) * 100 : 0;
            const annReturn = rawReturn * (365 / dte);
            const taxReturn = annReturn * (1 - (taxRate / 100));

            outputs.stockCost.innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(stockCost);
            outputs.rawReturn.innerText = rawReturn.toFixed(2) + '%';
            outputs.annReturn.innerText = annReturn.toFixed(2) + '%';
            outputs.taxReturn.innerText = taxReturn.toFixed(2) + '%';
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculate);
        });
    </script>
</body>
</html>
